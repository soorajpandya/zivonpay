version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: zivonpay-postgres
    environment:
      POSTGRES_DB: zivonpay_sandbox
      POSTGRES_USER: zivonpay
      POSTGRES_PASSWORD: password
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zivonpay"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zivonpay-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: zivonpay-redis
    command: redis-server --appendonly yes --requirepass redispassword
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zivonpay-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zivonpay-backend
    environment:
      - ENVIRONMENT=sandbox
      - DATABASE_URL=postgresql+asyncpg://zivonpay:password@postgres:5432/zivonpay_sandbox
      - REDIS_URL=redis://:redispassword@redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
    networks:
      - zivonpay-network
    restart: unless-stopped

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: zivonpay-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - zivonpay-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:

networks:
  zivonpay-network:
    driver: bridge
